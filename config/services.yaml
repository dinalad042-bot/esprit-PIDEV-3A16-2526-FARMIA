# config/services.yaml

parameters:
    # Paramètres pour les APIs existantes
    app.weather_api_key: '%env(OPENWEATHER_API_KEY)%'
    
    # Nouveau paramètre pour l'IA via Groq
    app.groq_api_key: '%env(GROQ_API_KEY)%'

services:
    # Configuration par défaut
    _defaults:
        autowire: true      
        autoconfigure: true 
        
        # Le BIND global permet d'injecter automatiquement les clés dans vos constructeurs
        # Il suffit de nommer l'argument exactement comme ci-dessous
        bind:
            $weatherApiKey: '%app.weather_api_key%'
            $perenualApiKey: '%env(PERENUAL_API_KEY)%'
            $groqApiKey: '%app.groq_api_key%'
            $apiKey: '%app.groq_api_key%'

    # Chargement automatique des classes de src/
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Configuration du service PlantService
    App\Service\PlantService:
        arguments:
            $trefleApiToken: '%env(TREFLE_API_TOKEN)%'

    # Injection spécifique pour AnimalController
    # (Le bind global suffit normalement, mais on le définit explicitement pour la clarté)
    App\Controller\AnimalController:
        arguments:
            $groqApiKey: '%app.groq_api_key%'
        tags: ['controller.service_arguments']