security:
    password_hashers:
        App\Entity\User:
            id: App\Security\LegacyPasswordHasher

    providers:
        app_user_provider:
            entity:
                class:    App\Entity\User
                property: email      # used as the user identifier

    firewalls:
        dev:
            pattern:  ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Stateless API firewall – no session, no cookie
        api:
            pattern:   ^/api
            stateless: true
            provider:  app_user_provider

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                success_handler: App\Security\LoginSuccessHandler
                failure_handler: App\Security\LoginFailureHandler
                enable_csrf: true
            logout:
                path: app_logout
                target: splash_logout

    access_control:
        - { path: ^/api/signup, roles: PUBLIC_ACCESS }
        - { path: ^/api/login,  roles: PUBLIC_ACCESS }
        - { path: ^/captcha, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/signup, roles: PUBLIC_ACCESS }
        - { path: ^/admin/dashboard, roles: ROLE_ADMIN }
        - { path: ^/expert/dashboard, roles: ROLE_EXPERT }
        - { path: ^/agricole/dashboard, roles: ROLE_AGRICOLE }
        - { path: ^/fournisseur/dashboard, roles: ROLE_FOURNISSEUR }
        # ERP: vente = fournisseur only
        - { path: ^/erp/vente, roles: ROLE_FOURNISSEUR }
        # ERP: achat, matiere = agricole only
        - { path: ^/erp/achat, roles: ROLE_AGRICOLE }
        - { path: ^/erp/matiere, roles: ROLE_AGRICOLE }
        # ERP: produit write actions = agricole only (index readable by both via controller)
        - { path: ^/erp/produit/new, roles: ROLE_AGRICOLE }
        - { path: ^/erp/produit/\d+/edit, roles: ROLE_AGRICOLE }
        - { path: ^/erp/produit/\d+/delete, roles: ROLE_AGRICOLE }
        - { path: ^/erp/produit/\d+/produire, roles: ROLE_AGRICOLE }
        # ERP dashboard + produit index accessible to both
        - { path: ^/erp, roles: [ROLE_AGRICOLE, ROLE_FOURNISSEUR] }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost:        4   # lowest bcrypt cost for speed
                time_cost:   3
                memory_cost: 10
